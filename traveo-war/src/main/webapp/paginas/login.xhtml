<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Login</title>
</h:head>
<h:body>
    <h:form>
        <h2>Login</h2>
        <p:messages id="messages" showDetail="true" closable="true"/>

        <h:panelGrid columns="2">
            <p:outputLabel for="email" value="Email:"/>
            <p:inputText id="email"
                         value="#{usuarioController.loginEmail}"
                         required="true"
                         requiredMessage="El email es requerido"/>

            <p:outputLabel for="password" value="Password:"/>
            <p:password id="password"
                        value="#{usuarioController.loginPassword}"
                        required="true"
                        requiredMessage="La contraseña es requerida"/>

            <p:commandButton value="Login"
                             action="#{usuarioController.login}"
                             update="@form messages"/>
            <p:button value="Registro"
                      outcome="/paginas/register.xhtml"/>
        </h:panelGrid>
    </h:form>
</h:body>
</html>
