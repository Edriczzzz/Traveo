<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Registro</title>
</h:head>
<h:body>
    <h:form>
        <p:panel header="Registro">
            <p:messages id="messages" showDetail="true" closable="true"/>

            <h:panelGrid columns="2">
                <p:outputLabel for="nombre" value="Nombre:"/>
                <p:inputText id="nombre"
                             value="#{usuarioController.usuario.nombre}"
                             required="true"
                             requiredMessage="El nombre es requerido"/>

                <p:outputLabel for="correo" value="Correo:"/>
                <p:inputText id="correo"
                             value="#{usuarioController.usuario.correo}"
                             required="true"
                             requiredMessage="El correo es requerido"/>

                <p:outputLabel for="telefono" value="Teléfono:"/>
                <p:inputText id="telefono"
                             value="#{usuarioController.usuario.telefono}"/>

                <p:outputLabel for="password" value="Contraseña:"/>
                <p:password id="password"
                            value="#{usuarioController.usuario.contrasena}"
                            required="true"
                            requiredMessage="La contraseña es requerida"/>
            </h:panelGrid>

            <p:commandButton value="Registrar"
                             action="#{usuarioController.saveUsuario()}"
                             update="@form messages"/>
        </p:panel>
    </h:form>
</h:body>
</html>
